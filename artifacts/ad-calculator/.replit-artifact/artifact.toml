kind = "web"
previewPath = "/"
title = "DBG Ad Rate Calculator"
version = "1.0.0"
id = "artifacts/ad-calculator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23391
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/ad-calculator run dev"

[services.env]
PORT = "23391"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/ad-calculator", "run", "build"]
publicDir = "artifacts/ad-calculator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
